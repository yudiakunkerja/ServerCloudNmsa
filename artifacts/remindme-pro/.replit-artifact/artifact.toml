kind = "web"
previewPath = "/"
title = "RemindMe Pro"
version = "1.0.0"
id = "artifacts/remindme-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18948

[services.development]
run = "pnpm --filter @workspace/remindme-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/remindme-pro", "run", "build" ]
publicDir = "artifacts/remindme-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18948"
BASE_PATH = "/"
